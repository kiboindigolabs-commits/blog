baseURL = "https://blog-19g.pages.dev"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "AI Tools Lab"
theme = "PaperMod"
enableRobotsTXT = true
enableGitInfo = true
buildDrafts = false
buildFuture = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "light"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = false
  ShowToc = true
  TocOpen = true
  ShowCoverImageInList = true
  ShowCoverImageInSingle = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  dateFormat = "2006年01月02日"
  description = "AIツールの最新情報・使い方・おすすめをわかりやすく紹介するブログ"
  images = ["/images/og-default.png"]
  author = "AI Tools Lab 編集部"
  keywords = ["AIツール", "ChatGPT", "Claude", "AI活用", "ブログ"]
  copyright = "© 2026 AI Tools Lab"
  comments = true

  [params.assets]
    favicon          = "/favicon.svg"
    favicon16x16     = "/favicon-16x16.png"
    favicon32x32     = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"

  [params.logo]
    logoText = "🤖 AI Tools Lab"

  # Google Search Console の確認タグ
  # https://search.google.com/search-console でコードを取得してここに貼り付ける
  [params.analytics.google]
    SiteVerificationTag = "JRFAdtNT-6eWrdVqVKPu509qpxgPHNGwVaKG-xMCgfc"

  # Schema.org 設定
  [params.schema]
    publisherType = "Organization"

  [params.homeInfoParams]
    Title = "AIツールをもっと身近に 🤖"
    Content = "最新のAIツール情報・使い方・おすすめを、初心者にもわかりやすく紹介します。気になる記事はカテゴリやタグから探してみてください。"

  [[params.socialIcons]]
    name = "rss"
    url  = "/index.xml"

[menu]
  [[menu.main]]
    name = "記事一覧"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "AIツール紹介"
    url = "/categories/aiツール紹介/"
    weight = 2
  [[menu.main]]
    name = "タグ"
    url = "/tags/"
    weight = 3
  [[menu.main]]
    name = "アーカイブ"
    url = "/archives/"
    weight = 4
  [[menu.main]]
    name = "検索"
    url = "/search/"
    weight = 5
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 6

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false
