baseURL = "https://blog-19g.pages.dev"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "AI Tools Lab"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "light"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowShareButtons = true
  ShowToc = true
  TocOpen = true
  dateFormat = "2006年01月02日"
  description = "AIツールの最新情報・使い方・おすすめをわかりやすく紹介するブログ"
  images = ["/images/og-default.png"]

  [params.homeInfoParams]
    Title = "AIツールをもっと身近に"
    Content = "最新のAIツール情報、使い方、おすすめを初心者にもわかりやすく紹介します。"

  [params.socialIcons]
    [[params.socialIcons]]
      name = "twitter"
      url  = "https://twitter.com/"

[menu]
  [[menu.main]]
    name = "記事一覧"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "AIツール紹介"
    url = "/categories/aiツール紹介/"
    weight = 2
  [[menu.main]]
    name = "タグ"
    url = "/tags/"
    weight = 3

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false
