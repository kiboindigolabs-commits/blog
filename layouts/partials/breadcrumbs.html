{{- if (.Param "ShowBreadCrumbs") -}}
<nav class="breadcrumbs" aria-label="パンくずリスト" itemscope itemtype="https://schema.org/BreadcrumbList">
  {{- $ancestors := .Ancestors.Reverse -}}
  {{- range $i, $bc := $ancestors }}
    <span itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
      {{- if eq $i 0 }}
        <a itemprop="item" href="{{ $bc.RelPermalink }}">
          <span itemprop="name">ホーム</span>
        </a>
        <meta itemprop="position" content="{{ add $i 1 }}">
      {{- else }}
        <span class="breadcrumb-sep" aria-hidden="true">›</span>
        <a itemprop="item" href="{{ $bc.RelPermalink }}">
          <span itemprop="name">{{ $bc.Title }}</span>
        </a>
        <meta itemprop="position" content="{{ add $i 1 }}">
      {{- end }}
    </span>
  {{- end }}
  {{- $pos := add (len $ancestors) 1 }}
  <span class="breadcrumb-sep" aria-hidden="true">›</span>
  <span class="breadcrumb-current" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem" aria-current="page">
    <span itemprop="name">{{ .Title }}</span>
    <meta itemprop="item" content="{{ .Permalink }}">
    <meta itemprop="position" content="{{ $pos }}">
  </span>
</nav>
{{- end -}}
